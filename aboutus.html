<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizeros · Partner & Projects</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-clash { font-family: 'Clash Display', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center bg-[#0a0a0c]">

<div class="w-[1280px] max-w-[1280px] mx-auto px-[60px] py-[40px] relative bg-[#0a0a0c]">
    
    <div class="absolute top-[40px] right-[60px] z-10">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full bg-black flex items-center justify-center shadow-lg border border-[#333333] hover:scale-105 transition duration-200">
                <i class="fab fa-x-twitter text-white text-lg"></i>
            </div>
            <div class="w-11 h-11 rounded-full bg-[#1e88e5] flex items-center justify-center shadow-lg border border-[#64b5f6] hover:scale-105 transition duration-200">
                <i class="fas fa-basketball-ball text-white text-lg"></i>
            </div>
            <div class="w-11 h-11 rounded-full bg-[#0a66c2] flex items-center justify-center shadow-lg border border-[#3b8bc2] hover:scale-105 transition duration-200">
                <i class="fab fa-linkedin-in text-white text-lg"></i>
            </div>
        </div>
    </div>
    
    <div class="mb-8 mt-16 md:mt-8">
        <h1 class="text-5xl md:text-6xl font-semibold tracking-tight text-white leading-[1.1]">Meet The Minds<br>Behind The Work</h1>
    </div>

    <div class="flex gap-8 mb-10">
        <div class="w-[600px] h-[600px] rounded-[48px] border border-[#3a3a45] shadow-2xl flex-shrink-0 bg-cover bg-center" style="background-image: url('pict/aboutus.png');"></div>
        
        <div class="flex-1 flex flex-col">
            <p class="text-[#d0d0d0] text-2xl leading-relaxed font-normal">
                At Aizeros, we bring together designers, strategists, and makers to craft bold, thoughtful digital experiences made with care and curiosity.
            </p>
            
            <div class="flex justify-end mt-2 opacity-30">
                <div class="flex -space-x-2">
                    <div class="w-10 h-10 rounded-full bg-[#3a3a45] border-2 border-[#4a4a55]"></div>
                    <div class="w-10 h-10 rounded-full bg-[#4a4a55] border-2 border-[#5a5a65]"></div>
                </div>
            </div>
            
            <div class="flex w-full gap-[1px] mt-8">
                <div class="w-1/2 bg-white rounded-[24px] p-6 flex flex-col h-[340px] shadow-2xl">
                    <div class="font-clash text-gray-900 font-semibold text-[48px] leading-[48px] tracking-[-0.03em]">
                        20+
                    </div>
                    <div class="font-poppins text-gray-600 text-sm leading-5">
                        Trusted Partner
                    </div>
                    
                    <div class="flex justify-center items-center w-full mt-12 mb-12">
                        <img src="pict/partneraboutus.png" alt="Partner Logos" class="max-w-[100%] h-auto brightness-95">
                    </div>
                    
                    <div class="flex justify-center mt-2">
                        <a href="#" class="bg-linear-to-r from-[#0013FF] to-[#11B7FC] text-white font-semibold px-6 py-3 rounded-full text-sm hover:opacity-90 transition shadow-lg flex items-center gap-2">
                            Book a call <span>→</span>
                        </a>
                    </div>
                </div>
                
                <div class="w-1/2 bg-white rounded-[24px] p-1 h-[340px] shadow-2xl">
                    <div class="w-full h-full rounded-[20px] bg-cover bg-center" style="background-image: url('pict/ezendofact.png');"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white/16 px-10 py-6 w-full mt-10">
        <div class="flex justify-between items-center w-full">
            <div class="relative flex-1 text-center px-4 before:content-[''] before:absolute before:right-[-2px] before:top-[15%] before:h-[70%] before:w-[1px] before:bg-linear-to-b before:from-transparent before:via-white/30 before:to-transparent">
                <div class="text-5xl font-semibold text-white tracking-tight">15</div>
                <div class="text-sm font-medium text-[#a0a0a0] uppercase tracking-wider mt-1">Industries Served</div>
            </div>
            <div class="relative flex-1 text-center px-4 before:content-[''] before:absolute before:right-[-2px] before:top-[15%] before:h-[70%] before:w-[1px] before:bg-linear-to-b before:from-transparent before:via-white/30 before:to-transparent">
                <div class="text-5xl font-semibold text-white tracking-tight">4+</div>
                <div class="text-sm font-medium text-[#a0a0a0] uppercase tracking-wider mt-1">Years of Experience</div>
            </div>
            <div class="relative flex-1 text-center px-4 before:content-[''] before:absolute before:right-[-2px] before:top-[15%] before:h-[70%] before:w-[1px] before:bg-linear-to-b before:from-transparent before:via-white/30 before:to-transparent">
                <div class="text-5xl font-semibold text-white tracking-tight">100+</div>
                <div class="text-sm font-medium text-[#a0a0a0] uppercase tracking-wider mt-1">Happy Clients</div>
            </div>
            <div class="flex-1 text-center px-4">
                <div class="text-5xl font-semibold text-white tracking-tight">40+</div>
                <div class="text-sm font-medium text-[#a0a0a0] uppercase tracking-wider mt-1">Projects Delivered</div>
            </div>
        </div>
    </div>
</div>

</html>
